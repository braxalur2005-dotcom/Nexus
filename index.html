<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Desarrollo Web Profesional</title>
    <meta name="description" content="Servicios de desarrollo de páginas web profesionales. Calidad, diseño y tecnología para tu negocio.">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script>
        window.useState = React.useState;
        window.useEffect = React.useEffect;
        window.useRef = React.useRef;
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/lucide-static@0.516.0/font/lucide.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        nexus: {
                            dark: '#030712',
                            blue: '#1d4ed8',
                            purple: '#6d28d9',
                            accent: '#3b82f6',
                            glow: '#8b5cf6'
                        }
                    },
                    animation: {
                        'blob': 'blob 7s infinite',
                        'shimmer': 'shimmer 2s infinite linear',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        },
                        shimmer: {
                            '0%': { transform: 'translateX(-100%)' },
                            '100%': { transform: 'translateX(100%)' }
                        }
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-nexus-dark text-white font-sans antialiased overflow-x-hidden min-h-screen;
            }
            h1, h2, h3, h4, h5, h6 {
                @apply font-heading tracking-tight;
            }
        }
        @layer components {
            .glass-panel {
                @apply bg-white/5 backdrop-blur-xl border border-white/10 rounded-2xl transition-all duration-500 hover:border-nexus-glow/50 hover:shadow-[0_0_30px_-5px_rgba(139,92,246,0.3)] hover:-translate-y-2 relative overflow-hidden;
            }
            .btn-primary {
                @apply relative overflow-hidden px-8 py-3 rounded-lg bg-gradient-to-r from-nexus-blue to-nexus-purple text-white font-semibold transition-all duration-300 hover:shadow-[0_0_25px_rgba(109,40,217,0.6)] hover:-translate-y-1 hover:scale-105;
            }
            .btn-primary::after {
                content: '';
                @apply absolute top-0 left-0 w-[200%] h-full bg-gradient-to-r from-transparent via-white/20 to-transparent -skew-x-12 translate-x-[-150%] transition-transform duration-700 ease-in-out;
            }
            .btn-primary:hover::after {
                @apply translate-x-[50%];
            }
            .btn-secondary {
                @apply relative px-8 py-3 rounded-lg border border-nexus-accent/50 text-white font-semibold hover:bg-nexus-blue/10 hover:border-nexus-accent transition-all duration-300 hover:shadow-[0_0_15px_rgba(59,130,246,0.4)] hover:-translate-y-1;
            }
        }
        .gradient-text {
            @apply bg-clip-text text-transparent bg-gradient-to-r from-nexus-accent to-nexus-glow;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #030712; 
        }
        ::-webkit-scrollbar-thumb {
            background: #6d28d9; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3b82f6; 
        }
    </style>
</head>
<body class="relative">
    <div class="fixed inset-0 z-[-2] opacity-10" style="background-image: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80'); background-size: cover; background-position: center; background-attachment: fixed;"></div>
    <div class="fixed inset-0 z-[-1] bg-gradient-to-b from-nexus-dark/60 via-nexus-dark/95 to-nexus-dark"></div>
    <div id="root"></div>

    <script type="text/babel" src="utils/db.js"></script>
    <script type="text/babel" src="components/Navbar.js"></script>
    <script type="text/babel" src="components/Hero.js"></script>
    <script type="text/babel" src="components/Catalog.js"></script>
    <script type="text/babel" src="components/Packages.js"></script>
    <script type="text/babel" src="components/Contact.js"></script>
    <script type="text/babel" src="components/Footer.js"></script>
    <script type="text/babel" src="components/AuthModal.js"></script>
    <script type="text/babel" src="components/Profile.js"></script>
    <script type="text/babel" src="app.js"></script>
</body>
</html>
